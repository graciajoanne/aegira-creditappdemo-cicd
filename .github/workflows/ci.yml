name: Aegira Credit App Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: aegira-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, docker-local]
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Login ke Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build image backend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/aegira-backend:latest ./aegira-loan-service

      - name: Build image frontend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/aegira-frontend:latest ./creditappdemo

      - name: Push image backend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/aegira-backend:latest

      - name: Push image frontend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/aegira-frontend:latest

  test-backend:
    needs: build
    runs-on: [self-hosted, docker-local]
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Maven
        run: |
          apt-get update -qq
          apt-get install -y maven

      - name: Nyalakan Postgres & Redis
        run: docker compose up -d postgres redis

      - name: Tunggu Postgres siap
        run: |
          until docker exec aegira-postgres pg_isready -U aegira -d aegira_loan; do
            echo "Postgres belum siap, tunggu 2 detik..."
            sleep 2
          done

      - name: Jalankan test API backend
        working-directory: ./aegira-loan-service
        run: mvn test

      - name: Bersihkan infra test
        if: always()
        run: docker compose down --remove-orphans

  test-frontend:
    needs: test-backend
    runs-on: [self-hosted, docker-local]
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Hentikan container frontend lama (bebaskan port 5173)
        run: docker stop aegira-frontend 2>/dev/null || true

      - name: Install dependencies
        working-directory: ./creditappdemo
        run: npm ci

      - name: Install Playwright browser (chromium)
        working-directory: ./creditappdemo
        run: npx playwright install --with-deps chromium

      - name: Jalankan test frontend
        working-directory: ./creditappdemo
        run: npm run test:e2e

      - name: Upload laporan Playwright jika gagal
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: creditappdemo/playwright-report/
          retention-days: 7

  pull-registry:
    needs: test-frontend
    runs-on: [self-hosted, docker-local]
    steps:
      - name: Login ke Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull image backend dari registry
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/aegira-backend:latest

      - name: Pull image frontend dari registry
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/aegira-frontend:latest

  deploy:
    needs: pull-registry
    runs-on: [self-hosted, docker-local]
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Bersihkan container lama sebelum deploy
        run: docker compose -f docker-compose.deploy.yml down --remove-orphans

      - name: Deploy menggunakan image dari registry
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: docker compose -f docker-compose.deploy.yml up -d

      - name: Show running containers
        run: docker compose -f docker-compose.deploy.yml ps

      - name: Show logs if deployment fails
        if: failure()
        run: docker compose -f docker-compose.deploy.yml logs