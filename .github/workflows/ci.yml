name: Aegira Credit App Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: aegira-deploy
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: [self-hosted, docker-local]
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Maven
        run: |
          apt-get update -qq
          apt-get install -y maven

      - name: Nyalakan Postgres & Redis
        run: docker compose up -d postgres redis

      - name: Tunggu Postgres siap
        run: |
          until docker exec aegira-postgres pg_isready -U aegira -d aegira_loan; do
            echo "Postgres belum siap, tunggu 2 detik..."
            sleep 2
          done

      - name: Jalankan test API backend
        working-directory: ./aegira-loan-service
        run: mvn test

      - name: Bersihkan infra test
        if: always()
        run: docker compose down --remove-orphans

  deploy:
    needs: test-backend
    runs-on: [self-hosted, docker-local]
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Bersihkan container lama sebelum deploy
        run: docker compose down --remove-orphans

      - name: Build and Deploy
        run: docker compose up -d --build --remove-orphans

      - name: Show running containers
        run: docker compose ps

      - name: Show logs if deployment fails
        if: failure()
        run: docker compose logs