name: aegira-credit-app

services:
  postgres:
    image: postgres:14-alpine
    container_name: aegira-postgres
    environment:
      POSTGRES_DB: aegira_loan
      POSTGRES_USER: aegira
      POSTGRES_PASSWORD: aegira_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegira -d aegira_loan"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:5.0.3-alpine
    container_name: aegira-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    image: ${DOCKERHUB_USERNAME}/aegira-backend:latest
    container_name: aegira-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aegira_loan
      SPRING_DATASOURCE_USERNAME: aegira
      SPRING_DATASOURCE_PASSWORD: aegira_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: replace-with-a-long-random-secret
      JWT_EXPIRATION: 3600000

  frontend:
    image: ${DOCKERHUB_USERNAME}/aegira-frontend:latest
    container_name: aegira-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  redis_data: